---
layout: default
---

{% assign post = site.posts.first %}

<div class='section_header'>Latest</div>
<div id="post">

    <div class='title'>
        <a href="{{ post.url }}">{{ post.title }}</a>
    </div>
    <div class='date'>
        {{ post.date | date_to_string }}
    </div> 
    <div id='body'>
        {{ post.content }}
    </div>
</div>
